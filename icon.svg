<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fef4ea"/>
      <stop offset="55%" stop-color="#fde9d6"/>
      <stop offset="100%" stop-color="#cfe7c5"/>
    </linearGradient>
    <radialGradient id="centerGrad" cx="0.4" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#fde88a"/>
      <stop offset="100%" stop-color="#e9c44a"/>
    </radialGradient>
    <radialGradient id="petalShine" cx="0.4" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#fcc8d8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f4a8c2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square base (iOS auto-masks; this looks good in other contexts) -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Soft sun in upper-right -->
  <circle cx="830" cy="190" r="80" fill="#fde88a" opacity="0.55"/>

  <!-- Grass blades along the bottom -->
  <g fill="#9fc77a" opacity="0.85">
    <path d="M0,920 Q120,820 240,910 L240,1024 L0,1024 Z"/>
    <path d="M180,920 Q340,830 480,910 L480,1024 L180,1024 Z" opacity="0.85"/>
    <path d="M420,930 Q580,840 740,920 L740,1024 L420,1024 Z" opacity="0.9"/>
    <path d="M640,925 Q820,840 1024,920 L1024,1024 L640,1024 Z" opacity="0.85"/>
  </g>
  <g fill="#7fae5d">
    <path d="M0,955 Q160,895 320,960 L320,1024 L0,1024 Z"/>
    <path d="M260,965 Q440,905 620,960 L620,1024 L260,1024 Z"/>
    <path d="M540,960 Q740,900 1024,955 L1024,1024 L540,1024 Z"/>
  </g>

  <!-- Stem -->
  <rect x="496" y="540" width="32" height="340" rx="16" fill="#7fae5d"/>

  <!-- Left leaf -->
  <path d="M512,720 Q380,690 320,580 Q440,640 512,720 Z" fill="#9fc77a"/>
  <path d="M512,720 Q400,680 350,610" stroke="#7fae5d" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Right leaf -->
  <path d="M512,780 Q644,750 704,640 Q584,700 512,780 Z" fill="#9fc77a"/>
  <path d="M512,780 Q624,740 674,670" stroke="#7fae5d" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Flower head: 6 petals around a center -->
  <g transform="translate(512,460)">
    <!-- back petals (lighter to feel layered) -->
    <g opacity="0.95">
      <g transform="rotate(30)"><ellipse cx="0" cy="-200" rx="120" ry="160" fill="#f4a8c2"/></g>
      <g transform="rotate(90)"><ellipse cx="0" cy="-200" rx="120" ry="160" fill="#f4a8c2"/></g>
      <g transform="rotate(150)"><ellipse cx="0" cy="-200" rx="120" ry="160" fill="#f4a8c2"/></g>
      <g transform="rotate(210)"><ellipse cx="0" cy="-200" rx="120" ry="160" fill="#f4a8c2"/></g>
      <g transform="rotate(270)"><ellipse cx="0" cy="-200" rx="120" ry="160" fill="#f4a8c2"/></g>
      <g transform="rotate(330)"><ellipse cx="0" cy="-200" rx="120" ry="160" fill="#f4a8c2"/></g>
    </g>
    <!-- highlight on petals -->
    <g opacity="0.85">
      <g transform="rotate(30)"><ellipse cx="0" cy="-220" rx="80" ry="100" fill="url(#petalShine)"/></g>
      <g transform="rotate(90)"><ellipse cx="0" cy="-220" rx="80" ry="100" fill="url(#petalShine)"/></g>
      <g transform="rotate(150)"><ellipse cx="0" cy="-220" rx="80" ry="100" fill="url(#petalShine)"/></g>
      <g transform="rotate(210)"><ellipse cx="0" cy="-220" rx="80" ry="100" fill="url(#petalShine)"/></g>
      <g transform="rotate(270)"><ellipse cx="0" cy="-220" rx="80" ry="100" fill="url(#petalShine)"/></g>
      <g transform="rotate(330)"><ellipse cx="0" cy="-220" rx="80" ry="100" fill="url(#petalShine)"/></g>
    </g>

    <!-- Center -->
    <circle cx="0" cy="0" r="155" fill="url(#centerGrad)"/>
    <ellipse cx="-45" cy="-50" rx="55" ry="35" fill="#fdeaa8" opacity="0.55"/>

    <!-- Face -->
    <!-- eyes -->
    <ellipse cx="-50" cy="-15" rx="14" ry="18" fill="#4a3328"/>
    <ellipse cx="50" cy="-15" rx="14" ry="18" fill="#4a3328"/>
    <!-- eye shines -->
    <circle cx="-46" cy="-22" r="4" fill="#fff"/>
    <circle cx="54" cy="-22" r="4" fill="#fff"/>
    <!-- rosy cheeks -->
    <ellipse cx="-80" cy="30" rx="20" ry="12" fill="#f4a8c2" opacity="0.55"/>
    <ellipse cx="80" cy="30" rx="20" ry="12" fill="#f4a8c2" opacity="0.55"/>
    <!-- smile -->
    <path d="M-32,30 Q0,62 32,30" stroke="#4a3328" stroke-width="10" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Tiny ladybug accent on left leaf -->
  <g transform="translate(370,640) rotate(-12)">
    <ellipse cx="0" cy="0" rx="32" ry="24" fill="#d96666"/>
    <path d="M0,-22 L0,22" stroke="#3a2a22" stroke-width="3"/>
    <circle cx="0" cy="-22" r="12" fill="#3a2a22"/>
    <circle cx="-12" cy="-2" r="3.5" fill="#3a2a22"/>
    <circle cx="12" cy="-2" r="3.5" fill="#3a2a22"/>
    <circle cx="-10" cy="14" r="3" fill="#3a2a22"/>
    <circle cx="10" cy="14" r="3" fill="#3a2a22"/>
  </g>
</svg>
