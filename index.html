<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Tiny Garden">
<meta name="application-name" content="Tiny Garden">
<meta name="theme-color" content="#fdf6e3">
<title>Tiny Garden</title>
<!-- Favicons -->
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png">
<!-- iOS home-screen icons -->
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152.png">
<!-- Android / PWA -->
<link rel="manifest" href="manifest.webmanifest">
<style>
  :root {
    --sky-top:#fdf6e3;
    --sky-bot:#e6f0d8;
    --grass:#9fc77a;
    --grass-dark:#7fae5d;
    --petal:#f4a8c2;
    --petal-deep:#e88aa9;
    --sun:#f5d76e;
    --sun-deep:#e9c44a;
    --lavender:#c5a8d8;
    --leaf:#7fae5d;
    --ladybug:#d96666;
    --bark:#7b5b3d;
    --ink:#4a3328;
    --soft:#fff8ec;
    --cloud:#ffffff;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height:100%; margin:0; overflow:hidden; overscroll-behavior:none; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Quicksand", "Comic Sans MS", system-ui, sans-serif;
    color: var(--ink);
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bot) 75%, var(--grass) 100%);
    user-select:none;
    -webkit-user-select:none;
    touch-action:none;
  }
  header {
    position:fixed; top:0; left:0; right:0;
    display:flex; align-items:center; justify-content:space-between;
    padding: max(env(safe-area-inset-top), 10px) 16px 8px 16px;
    z-index: 20;
    pointer-events:none;
  }
  header .title {
    font-size: clamp(18px, 4vw, 24px);
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--ink);
    background: rgba(255,255,255,0.55);
    padding: 6px 14px;
    border-radius: 999px;
    pointer-events:auto;
    display:inline-flex; align-items:center; gap:6px;
  }
  header .title .flower-mark { width: 22px; height: 22px; flex: 0 0 auto; }
  .home-title { display:flex; align-items:center; justify-content:center; gap: 10px; }
  .home-title .flower-mark { width: clamp(36px, 8vw, 48px); height: clamp(36px, 8vw, 48px); flex: 0 0 auto; }
  header .controls { display:flex; gap:8px; pointer-events:auto; }
  .iconbtn {
    width:44px; height:44px; border-radius:50%;
    border:none; background:rgba(255,255,255,0.7);
    font-size:20px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 2px 6px rgba(74,51,40,0.12);
  }
  .iconbtn:active { transform: scale(0.94); }

  .carousel {
    position:relative;
    width:100%; height:100%;
    overflow:hidden;
  }
  .track {
    display:flex;
    width:100%; height:100%;
    transition: transform 420ms cubic-bezier(.22,1,.36,1);
    will-change: transform;
  }
  .game {
    flex: 0 0 100%;
    width:100%; height:100%;
    position:relative;
    overflow:hidden;
  }
  .game-label {
    position:absolute; top: calc(max(env(safe-area-inset-top),10px) + 56px);
    left:50%; transform:translateX(-50%);
    background: rgba(255,255,255,0.7);
    padding: 8px 18px; border-radius: 999px;
    font-weight:700; font-size: clamp(14px, 3.5vw, 18px);
    z-index: 5;
    box-shadow: 0 2px 6px rgba(74,51,40,0.08);
  }

  /* Navigation */
  .nav {
    position:absolute; top:50%; transform:translateY(-50%);
    width:56px; height:56px; border-radius:50%;
    border:none; background: rgba(255,255,255,0.75);
    font-size: 28px; line-height:1; color: var(--ink);
    z-index: 15; cursor:pointer;
    box-shadow: 0 3px 8px rgba(74,51,40,0.15);
    display:flex; align-items:center; justify-content:center;
  }
  .nav:active { transform: translateY(-50%) scale(0.92); }
  .nav.prev { left: 10px; }
  .nav.next { right: 10px; }
  .nav:disabled { opacity: 0.35; }

  /* Dot indicator */
  .dots {
    position: fixed; bottom: max(env(safe-area-inset-bottom), 10px);
    left:50%; transform:translateX(-50%);
    display:flex; gap:8px; padding:8px 12px;
    background: rgba(255,255,255,0.55);
    border-radius: 999px; z-index: 20;
  }
  .dot {
    width:12px; height:12px; border-radius:50%;
    background: rgba(74,51,40,0.25);
    border:none; padding:0; cursor:pointer;
    transition: background-color 200ms, transform 200ms;
  }
  .dot.active { background: var(--petal-deep); transform: scale(1.3); }

  /* Scene base */
  .scene {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
  }
  .scene svg { width:100%; height:100%; display:block; }

  /* ==== Game 1: Pop ==== */
  #pop-canvas { position:absolute; inset:0; }
  .seed {
    position:absolute; pointer-events:auto;
    width:54px; height:54px;
    transition: transform 80ms;
  }
  .seed.popping { animation: popOut 380ms ease-out forwards; pointer-events:none; }
  @keyframes popOut {
    0% { transform: scale(1); opacity:1; }
    100% { transform: scale(1.8); opacity:0; }
  }

  /* ==== Game 2: Count ==== */
  .count-stage {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding-top: 90px; padding-bottom: 130px;
  }
  .count-flower { position:relative; width: min(60vw, 320px); aspect-ratio: 1/1; }
  .count-flower svg { width:100%; height:100%; }
  .count-bug {
    position:absolute; width:38px; height:38px;
    transition: transform 400ms ease;
  }
  .count-choices {
    display:flex; gap:14px; margin-top: 18px;
    flex-wrap:wrap; justify-content:center;
  }
  .choice {
    width: 74px; height: 74px; border-radius: 22px;
    border:none; cursor:pointer;
    background: var(--soft);
    box-shadow: 0 4px 0 var(--petal-deep), 0 6px 10px rgba(74,51,40,0.12);
    font-size: 34px; font-weight:800; color: var(--ink);
  }
  .choice:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--petal-deep); }
  .choice.right { background: #d9f0c1; animation: wiggle 500ms ease; }
  .choice.wrong { animation: shake 320ms ease; }
  @keyframes wiggle {
    0%,100% { transform: rotate(0); }
    25% { transform: rotate(-6deg); }
    75% { transform: rotate(6deg); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* ==== Game 3: Letters ==== */
  .letter-stage {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding-top: 90px; padding-bottom: 130px;
    gap: 18px;
  }
  .letter-prompt {
    background: rgba(255,255,255,0.85);
    border-radius: 24px;
    padding: 14px 26px;
    font-size: clamp(22px, 6vw, 32px);
    font-weight: 800;
    display:flex; align-items:center; gap: 14px;
    box-shadow: 0 4px 10px rgba(74,51,40,0.1);
  }
  .speak-btn { background: var(--sun); border:none; width:46px; height:46px;
    border-radius:50%; font-size:22px; cursor:pointer;
    box-shadow: 0 3px 0 var(--sun-deep);
  }
  .speak-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--sun-deep); }
  .letter-grid {
    display:grid; grid-template-columns: repeat(2, 1fr); gap: 18px;
    max-width: 360px; width: 90%;
  }
  .letter-flower {
    position:relative; aspect-ratio: 1/1;
    border:none; background:transparent; cursor:pointer;
    padding:0;
  }
  .letter-flower svg { width:100%; height:100%; display:block; }
  .letter-flower .lf-text {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-size: clamp(34px, 9vw, 56px); font-weight: 800;
    color: var(--ink); pointer-events:none;
  }
  .letter-flower.right svg { animation: wiggle 600ms ease; }
  .letter-flower.wrong svg { animation: shake 320ms ease; }

  /* ==== Game 4: Puzzle ==== */
  .puzzle-stage {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding-top: 90px; padding-bottom: 130px;
    gap: 14px;
  }
  .puzzle-board {
    position:relative;
    width: min(72vw, 320px);
    aspect-ratio: 1/1;
    background: rgba(255,255,255,0.55);
    border-radius: 20px;
    box-shadow: inset 0 0 0 3px rgba(74,51,40,0.08);
    overflow: hidden;
  }
  .puzzle-slot {
    position:absolute;
    width:50%; height:50%;
    border: 2px dashed rgba(74,51,40,0.18);
    box-sizing: border-box;
  }
  .puzzle-piece {
    position:absolute;
    width: calc(min(72vw, 320px) / 2);
    height: calc(min(72vw, 320px) / 2);
    cursor: grab;
    touch-action: none;
    transition: box-shadow 200ms;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 8px rgba(74,51,40,0.18);
    z-index: 5;
  }
  .puzzle-piece.placed { box-shadow: none; cursor: default; z-index: 1; }
  .puzzle-piece.dragging { z-index: 20; cursor: grabbing; box-shadow: 0 10px 18px rgba(74,51,40,0.25); }
  .puzzle-tray {
    position:relative; width: min(72vw, 320px);
    min-height: 90px;
    background: rgba(255,255,255,0.4);
    border-radius: 16px;
    padding: 8px;
  }
  .puzzle-done {
    position:absolute; inset: 0;
    display:flex; align-items:center; justify-content:center;
    background: rgba(255,255,255,0.6);
    border-radius: 20px;
    font-size: 24px; font-weight: 800;
    opacity: 0; pointer-events:none;
    transition: opacity 400ms;
  }
  .puzzle-done.show { opacity: 1; }
  .reset-btn {
    background: var(--soft); border:none;
    padding: 10px 18px; border-radius: 999px;
    font-weight: 700; font-size: 14px; cursor:pointer;
    box-shadow: 0 3px 0 var(--petal-deep);
  }
  .reset-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--petal-deep); }

  /* ==== Game 5: Butterfly ==== */
  #butterfly-canvas { position:absolute; inset:0; }
  .butterfly {
    position:absolute; width:88px; height:88px;
    pointer-events:auto; cursor:pointer;
    transition: left 2200ms ease, top 2200ms ease;
    transform-origin: center;
  }
  .butterfly .wings {
    transform-origin: 50% 50%;
    animation: flap 1800ms ease-in-out infinite;
  }
  .butterfly.fast .wings { animation-duration: 380ms; }
  @keyframes flap {
    0%,100% { transform: scaleX(1); }
    50% { transform: scaleX(0.5); }
  }
  .happy-burst {
    position:absolute; pointer-events:none;
    font-size: 28px;
    animation: rise 1200ms ease-out forwards;
  }
  @keyframes rise {
    0% { transform: translate(-50%,-50%) scale(0.4); opacity:0; }
    20% { opacity: 1; }
    100% { transform: translate(-50%, -120%) scale(1.2); opacity:0; }
  }

  /* Background scene shared bits */
  .bg-svg { position:absolute; inset:0; width:100%; height:100%; z-index:0; pointer-events:none; }

  /* Hide scrollbars in inner content if any */
  ::-webkit-scrollbar { display:none; }

  /* ===== Home hub ===== */
  body.home-mode .carousel { display:none; }
  body.home-mode .dots { display:none; }
  body.game-mode .home { display:none; }
  body:not(.game-mode) #homeBtn { display:none; }

  .home {
    position:fixed; inset:0;
    overflow-y:auto;
    -webkit-overflow-scrolling: touch;
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bot) 70%, var(--grass) 100%);
    padding: max(env(safe-area-inset-top), 14px) 16px max(env(safe-area-inset-bottom), 20px) 16px;
  }
  .home-inner {
    max-width: 640px; margin: 0 auto;
    padding-top: 56px;
  }
  .home-title {
    text-align:center;
    font-size: clamp(28px, 7vw, 40px);
    font-weight: 800; color: var(--ink);
    margin: 4px 0 4px;
  }
  .home-sub {
    text-align:center;
    font-size: clamp(13px, 3.5vw, 16px);
    color: var(--ink); opacity: 0.65;
    margin-bottom: 22px;
  }
  .cards {
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    padding-bottom: 24px;
  }
  .card {
    background: rgba(255,255,255,0.72);
    border-radius: 22px;
    padding: 14px 10px 12px;
    text-align:center;
    border:none; cursor:pointer;
    box-shadow: 0 5px 0 rgba(232,138,169,0.40), 0 8px 16px rgba(74,51,40,0.10);
    display:flex; flex-direction:column;
    align-items:center; gap: 8px;
    transition: transform 150ms;
    font-family: inherit;
  }
  .card:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(232,138,169,0.4); }
  .card .portrait {
    width: 76px; height: 76px;
    background: var(--soft);
    border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    box-shadow: inset 0 -3px 6px rgba(0,0,0,0.04);
  }
  .card .portrait svg { width: 64px; height: 64px; display:block; }
  .card .label {
    font-weight: 800;
    font-size: clamp(14px, 3.8vw, 17px);
    color: var(--ink);
    line-height: 1.15;
  }
  .card .age {
    font-size: 11px;
    color: var(--ink);
    opacity: 0.55;
    font-weight: 600;
    letter-spacing: 0.4px;
  }

  /* ===== Coloring game ===== */
  .color-stage {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    padding-top: max(env(safe-area-inset-top), 8px);
    padding-bottom: max(env(safe-area-inset-bottom), 4px);
  }
  .color-canvas-wrap {
    flex: 1 1 auto;
    display:flex; align-items:center; justify-content:center;
    padding: 96px 10px 6px;
    min-height: 0;
  }
  svg.coloring {
    width: 100%;
    height: 100%;
    max-width: 460px;
    background: #fff8ec;
    border-radius: 16px;
    box-shadow: 0 4px 14px rgba(74,51,40,0.10);
    object-fit: contain;
  }
  .color-tools {
    padding: 8px 12px 60px;
    background: rgba(255,255,255,0.75);
    border-radius: 22px 22px 0 0;
    box-shadow: 0 -3px 10px rgba(74,51,40,0.06);
    display:flex; flex-direction:column;
    gap: 6px;
  }
  .tool-tabs {
    display:flex; gap: 6px; justify-content:center;
  }
  .tab {
    padding: 6px 16px; border-radius: 999px;
    border:none; background: transparent;
    font-weight:700; cursor:pointer;
    color: var(--ink); opacity: 0.5;
    font-family: inherit; font-size: 14px;
  }
  .tab.active {
    background: var(--soft); opacity: 1;
    box-shadow: 0 2px 4px rgba(74,51,40,0.1);
  }
  .color-wheel {
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    padding: 2px 0;
  }
  .swatch {
    width: 100%; aspect-ratio: 1/1;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor:pointer;
    box-shadow: inset 0 -2px 4px rgba(0,0,0,0.10);
    padding:0;
  }
  .swatch.active {
    border-color: #fff;
    box-shadow: 0 0 0 3px var(--petal-deep), inset 0 -2px 4px rgba(0,0,0,0.10);
    transform: scale(1.08);
  }
  .sticker-row {
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    padding: 2px 0;
  }
  .sticker-pick {
    width: 100%; aspect-ratio: 1/1;
    border-radius: 14px;
    border: 3px solid transparent;
    background: #fff8ec;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    box-shadow: inset 0 -2px 4px rgba(0,0,0,0.06);
    padding:0;
  }
  .sticker-pick.active {
    border-color: var(--petal-deep);
    transform: scale(1.05);
  }
  .sticker-pick svg { width: 70%; height: 70%; }
  .color-actions {
    display:flex; justify-content:center; gap:8px;
    margin-top: 2px;
  }

  .fillable { cursor:pointer; }
  .placed-sticker { cursor:pointer; pointer-events:auto; }
</style>
</head>
<body class="home-mode">

<header>
  <div style="display:flex;align-items:center;gap:8px;pointer-events:auto;">
    <button class="iconbtn" id="homeBtn" aria-label="Home">🏡</button>
    <div class="title"><svg class="flower-mark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><g transform="translate(50,50)"><g transform="rotate(0)"><ellipse cx="0" cy="-30" rx="14" ry="22" fill="#f4a8c2"/></g><g transform="rotate(60)"><ellipse cx="0" cy="-30" rx="14" ry="22" fill="#f4a8c2"/></g><g transform="rotate(120)"><ellipse cx="0" cy="-30" rx="14" ry="22" fill="#f4a8c2"/></g><g transform="rotate(180)"><ellipse cx="0" cy="-30" rx="14" ry="22" fill="#f4a8c2"/></g><g transform="rotate(240)"><ellipse cx="0" cy="-30" rx="14" ry="22" fill="#f4a8c2"/></g><g transform="rotate(300)"><ellipse cx="0" cy="-30" rx="14" ry="22" fill="#f4a8c2"/></g><circle r="20" fill="#f5d76e"/><circle cx="-7" cy="-4" r="2.6" fill="#4a3328"/><circle cx="7" cy="-4" r="2.6" fill="#4a3328"/><path d="M-6,5 Q0,11 6,5" stroke="#4a3328" stroke-width="2.4" fill="none" stroke-linecap="round"/></g></svg> Tiny Garden</div>
  </div>
  <div class="controls">
    <button class="iconbtn" id="soundBtn" title="Sound on/off" aria-label="Toggle sound">🔊</button>
  </div>
</header>

<script>
/* =====================================================
   SHARED: Sound system (Web Audio, gentle sine chimes)
   ===================================================== */
const Sound = (() => {
  let ctx = null;
  let enabled = (localStorage.getItem('tg_sound') ?? '1') === '1';
  function init() {
    if (!ctx) {
      try { ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e) { ctx = null; }
    }
    if (ctx && ctx.state === 'suspended') ctx.resume();
  }
  function tone(freq, dur=0.35, type='sine', vol=0.14) {
    if (!enabled) return;
    init();
    if (!ctx) return;
    const t = ctx.currentTime;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(ctx.destination);
    o.start(t);
    o.stop(t + dur + 0.05);
  }
  function chime(freqs=[660, 880], stagger=80, dur=0.35) {
    freqs.forEach((f, i) => setTimeout(() => tone(f, dur), i * stagger));
  }
  function pop()    { tone(720, 0.18, 'triangle', 0.16); }
  function correct(){ chime([660, 880, 990], 90, 0.32); }
  function wrong()  { tone(280, 0.25, 'sine', 0.10); }
  function happy()  { chime([523, 659, 784, 1047], 70, 0.30); }
  function gentle() { tone(523, 0.40, 'sine', 0.10); }
  function setEnabled(v) {
    enabled = v;
    localStorage.setItem('tg_sound', v ? '1' : '0');
  }
  function isEnabled() { return enabled; }
  return { init, tone, chime, pop, correct, wrong, happy, gentle, setEnabled, isEnabled };
})();

const soundBtn = document.getElementById('soundBtn');
function updateSoundBtn() { soundBtn.textContent = Sound.isEnabled() ? '🔊' : '🔇'; }
updateSoundBtn();
soundBtn.addEventListener('click', () => {
  Sound.setEnabled(!Sound.isEnabled());
  updateSoundBtn();
  if (Sound.isEnabled()) Sound.gentle();
});
// Unlock audio on first user gesture
window.addEventListener('pointerdown', () => Sound.init(), { once:true });


/* =====================================================
   GAME ROTATION
   Controls which games show on the home screen & carousel,
   so you can swap games in and out each week (and add new
   ones over time) without deleting their code.

   To change the lineup: edit GAME_ROTATION below, then
   redeploy (push to main). Games appear in the order listed.

   Each entry: { key, active, weeks }
     key    – matches data-game on the <section> and its home card
     active – true shows it, false hides it (default: true)
     weeks  – OPTIONAL array of ISO week numbers (1–53). If set, the
              game shows ONLY during those weeks (overrides active),
              so you can queue a seasonal "game of the week" ahead of
              time. Example: a winter game -> weeks: [50, 51, 52, 1].

   Notes:
     • A game left out of this list entirely is still shown.
     • If the config would hide every game, it's ignored (fail-safe).
   ===================================================== */
const GAME_ROTATION = [
  { key: 'pop',       active: true },
  { key: 'butterfly', active: true },
  { key: 'color',     active: true },
  { key: 'puzzle',    active: true },
  { key: 'count',     active: true },
  { key: 'letter',    active: true },
];

// ISO 8601 week number (1–53) for a given date.
function isoWeek(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = date.getUTCDay() || 7;          // Mon=1 … Sun=7
  date.setUTCDate(date.getUTCDate() + 4 - day); // nearest Thursday
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil(((date - yearStart) / 86400000 + 1) / 7);
}

function isGameOn(entry, week) {
  if (Array.isArray(entry.weeks)) return entry.weeks.includes(week);
  return entry.active !== false;
}

// Apply the rotation before the carousel reads the game list: remove the
// panels + home cards for games switched off, and reorder survivors to
// match GAME_ROTATION. Runs against live DOM order so the dots, swipe
// math and card handlers downstream all see the final lineup.
(function applyRotation() {
  const week = isoWeek(new Date());
  const trackEl = document.getElementById('track');
  const cardsEl = document.getElementById('cards');
  const off = new Set(GAME_ROTATION.filter(e => !isGameOn(e, week)).map(e => e.key));
  const survivors = Array.from(trackEl.querySelectorAll('.game'))
    .map(g => g.dataset.game).filter(k => !off.has(k));
  if (survivors.length === 0) return; // fail-safe: never blank the app

  off.forEach(key => {
    const panel = trackEl.querySelector('.game[data-game="' + key + '"]');
    const card = cardsEl.querySelector('.card[data-game="' + key + '"]');
    if (panel) panel.remove();
    if (card) card.remove();
  });

  // Reorder kept games to the order listed in GAME_ROTATION.
  GAME_ROTATION.forEach(entry => {
    if (off.has(entry.key)) return;
    const panel = trackEl.querySelector('.game[data-game="' + entry.key + '"]');
    const card = cardsEl.querySelector('.card[data-game="' + entry.key + '"]');
    if (panel) trackEl.appendChild(panel);
    if (card) cardsEl.appendChild(card);
  });
})();


/* =====================================================
   SHARED: Carousel
   ===================================================== */
const track = document.getElementById('track');
const games = Array.from(track.querySelectorAll('.game'));
const dotsBox = document.getElementById('dots');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

let current = 0;
games.forEach((_, i) => {
  const d = document.createElement('button');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.setAttribute('aria-label', 'Go to game ' + (i+1));
  d.addEventListener('click', () => goTo(i));
  dotsBox.appendChild(d);
});
const dotEls = Array.from(dotsBox.children);

function goTo(i, silent = false) {
  current = Math.max(0, Math.min(games.length - 1, i));
  track.style.transform = `translateX(${-current * 100}%)`;
  dotEls.forEach((d, idx) => d.classList.toggle('active', idx === current));
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === games.length - 1;
  if (!silent) {
    Sound.gentle();
    document.dispatchEvent(new CustomEvent('game-activated', { detail: { game: games[current].dataset.game } }));
  }
}

/* Home / Game mode switching */
function showHome() {
  document.body.classList.remove('game-mode');
  document.body.classList.add('home-mode');
  // Stop any running game loops
  document.dispatchEvent(new CustomEvent('game-activated', { detail: { game: 'none' } }));
  Sound.gentle();
}
function showGame(idx) {
  document.body.classList.remove('home-mode');
  document.body.classList.add('game-mode');
  goTo(idx);
}
document.getElementById('homeBtn').addEventListener('click', showHome);
document.querySelectorAll('#cards .card').forEach(c => {
  c.addEventListener('click', () => {
    const target = c.dataset.game;
    const idx = games.findIndex(g => g.dataset.game === target);
    if (idx >= 0) showGame(idx);
  });
});
prevBtn.addEventListener('click', () => goTo(current - 1));
nextBtn.addEventListener('click', () => goTo(current + 1));

// keyboard nav
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') goTo(current - 1);
  else if (e.key === 'ArrowRight') goTo(current + 1);
});

// touch swipe
let touchStartX = null, touchStartY = null, swiping = false;
const carousel = document.getElementById('carousel');
function isInteractive(target) {
  return target.closest && target.closest('svg.coloring, .puzzle-piece, .butterfly, .seed, .swatch, .sticker-pick, .tab, .color-tools');
}
carousel.addEventListener('touchstart', (e) => {
  if (e.touches.length !== 1) return;
  if (isInteractive(e.target)) { swiping = false; touchStartX = null; return; }
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  swiping = true;
}, { passive: true });
carousel.addEventListener('touchmove', (e) => {
  if (!swiping || touchStartX === null) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  // if vertical, ignore
  if (Math.abs(dy) > Math.abs(dx)) swiping = false;
}, { passive: true });
carousel.addEventListener('touchend', (e) => {
  if (!swiping || touchStartX === null) { touchStartX = null; return; }
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 60) {
    if (dx < 0) goTo(current + 1);
    else goTo(current - 1);
  }
  touchStartX = null; swiping = false;
}, { passive: true });

// mouse drag (for desktop) — only swipe outside interactive zones
let mouseDown = false, mouseStartX = 0;
carousel.addEventListener('mousedown', (e) => {
  // skip if clicking interactive
  if (e.target.closest('button, .seed, .puzzle-piece, .butterfly, .letter-flower, .choice, svg.coloring, .fillable')) return;
  mouseDown = true; mouseStartX = e.clientX;
});
window.addEventListener('mouseup', (e) => {
  if (!mouseDown) return;
  const dx = e.clientX - mouseStartX;
  if (Math.abs(dx) > 80) {
    if (dx < 0) goTo(current + 1);
    else goTo(current - 1);
  }
  mouseDown = false;
});

// Position carousel silently — actual activation happens when user picks a game from home.
goTo(0, true);


/* =====================================================
   GAME 1: Pop the Fluff
   ===================================================== */
(() => {
  const wrap = document.getElementById('pop-canvas');
  const seeds = [];
  let spawnTimer = null;
  let active = false;

  function makeSeedSVG() {
    return `
      <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
        <g>
          ${Array.from({length: 12}).map((_,i)=>{
            const a = (i/12)*Math.PI*2;
            const x = 30 + Math.cos(a)*22;
            const y = 30 + Math.sin(a)*22;
            return `<line x1="30" y1="30" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
                    <circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="#fff" opacity="0.95"/>`;
          }).join('')}
          <circle cx="30" cy="30" r="6" fill="#fff8c4"/>
          <circle cx="30" cy="30" r="3" fill="#e9c44a"/>
        </g>
      </svg>
    `;
  }

  function spawn() {
    if (!active) return;
    const el = document.createElement('div');
    el.className = 'seed';
    el.innerHTML = makeSeedSVG();
    const rect = wrap.getBoundingClientRect();
    const x = Math.random() * (rect.width - 60);
    const y = rect.height - 40;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.dataset.vy = (0.4 + Math.random()*0.5).toFixed(2); // px per frame
    el.dataset.swayOffset = (Math.random()*Math.PI*2).toFixed(2);
    el.dataset.swayAmp = (10 + Math.random()*16).toFixed(1);
    el.dataset.startX = x.toFixed(1);
    el.dataset.t = '0';
    const handler = (e) => {
      e.preventDefault();
      e.stopPropagation();
      pop(el);
    };
    el.addEventListener('pointerdown', handler);
    wrap.appendChild(el);
    seeds.push(el);
    // keep array bounded
    if (seeds.length > 30) {
      const old = seeds.shift();
      if (old && old.parentNode) old.parentNode.removeChild(old);
    }
  }

  function pop(el) {
    if (el.classList.contains('popping')) return;
    el.classList.add('popping');
    Sound.pop();
    setTimeout(() => {
      if (el.parentNode) el.parentNode.removeChild(el);
      const idx = seeds.indexOf(el);
      if (idx >= 0) seeds.splice(idx, 1);
    }, 380);
  }

  let rafId = null;
  function loop() {
    if (!active) return;
    const rect = wrap.getBoundingClientRect();
    for (let i = seeds.length - 1; i >= 0; i--) {
      const el = seeds[i];
      if (el.classList.contains('popping')) continue;
      const vy = parseFloat(el.dataset.vy);
      const t = parseFloat(el.dataset.t) + 1;
      el.dataset.t = t;
      const startX = parseFloat(el.dataset.startX);
      const swayOff = parseFloat(el.dataset.swayOffset);
      const swayAmp = parseFloat(el.dataset.swayAmp);
      const top = parseFloat(el.style.top) - vy;
      const left = startX + Math.sin(t/40 + swayOff) * swayAmp;
      el.style.top = top + 'px';
      el.style.left = left + 'px';
      if (top < -60) {
        if (el.parentNode) el.parentNode.removeChild(el);
        seeds.splice(i, 1);
      }
    }
    rafId = requestAnimationFrame(loop);
  }

  function start() {
    if (active) return;
    active = true;
    if (spawnTimer) clearInterval(spawnTimer);
    spawnTimer = setInterval(spawn, 1100);
    // initial seeds
    for (let i = 0; i < 4; i++) setTimeout(spawn, i * 250);
    rafId = requestAnimationFrame(loop);
  }
  function stop() {
    active = false;
    if (spawnTimer) { clearInterval(spawnTimer); spawnTimer = null; }
    if (rafId) cancelAnimationFrame(rafId);
  }

  document.addEventListener('game-activated', (e) => {
    if (e.detail.game === 'pop') start(); else stop();
  });
})();

    const n = 1 + Math.floor(Math.random() * 5); // 1–5

(() => {
  const target = document.getElementById('letter-target');
  const grid = document.getElementById('letter-grid');
  const speakBtn = document.getElementById('speakBtn');

  const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

  const flowerColors = ['var(--petal)', 'var(--lavender)', 'var(--sun)', '#a8d8c5'];

  function flowerSVG(color) {
    return `
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="20" r="20" fill="${color}"/>
        <circle cx="80" cy="50" r="20" fill="${color}"/>
        <circle cx="50" cy="80" r="20" fill="${color}"/>
        <circle cx="20" cy="50" r="20" fill="${color}"/>
        <circle cx="28" cy="28" r="18" fill="${color}"/>
        <circle cx="72" cy="28" r="18" fill="${color}"/>
        <circle cx="28" cy="72" r="18" fill="${color}"/>
        <circle cx="72" cy="72" r="18" fill="${color}"/>
        <circle cx="50" cy="50" r="22" fill="#fff8e8"/>
      </svg>
    `;
  }

  let currentLetter = 'A';

  function speak(letter) {
    if (!('speechSynthesis' in window)) return;
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(letter);
      u.rate = 0.85; u.pitch = 1.05; u.volume = 0.9;
      window.speechSynthesis.speak(u);
    } catch(e) {}
  }

  function newRound() {
    const t = LETTERS[Math.floor(Math.random()*LETTERS.length)];
    currentLetter = t;
    target.textContent = t;

    // 4 unique letters including target
    const set = new Set([t]);
    while (set.size < 4) {
      const c = LETTERS[Math.floor(Math.random()*LETTERS.length)];
      set.add(c);
    }
    const arr = Array.from(set).sort(() => Math.random() - 0.5);
    grid.innerHTML = '';
    arr.forEach((l, i) => {
      const btn = document.createElement('button');
      btn.className = 'letter-flower';
      btn.innerHTML = flowerSVG(flowerColors[i % flowerColors.length]) +
        `<div class="lf-text">${l}</div>`;
      btn.addEventListener('click', () => {
        if (l === currentLetter) {
          btn.classList.add('right');
          Sound.correct();
          setTimeout(() => { newRound(); }, 900);
        } else {
          btn.classList.add('wrong');
          Sound.wrong();
          setTimeout(() => btn.classList.remove('wrong'), 400);
        }
      });
      grid.appendChild(btn);
    });
  }

  speakBtn.addEventListener('click', () => speak(currentLetter));

  document.addEventListener('game-activated', (e) => {
    if (e.detail.game === 'letter') newRound();
  });
  newRound();
})();


/* =====================================================
   GAME 4: Garden Puzzle (4 pieces, drag & drop)
   ===================================================== */
(() => {
  const section = document.querySelector('.game[data-game="puzzle"]');
  const board = document.getElementById('puzzle-board');
  const tray = document.getElementById('puzzle-tray');
  const doneEl = document.getElementById('puzzle-done');
  const resetBtn = document.getElementById('puzzle-reset');

  // The picture: a garden scene split into 4 quadrants.
  function fullSceneSVG() {
    return `
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" width="200" height="200">
        <defs>
          <linearGradient id="sky2" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#fdf6e3"/>
            <stop offset="100%" stop-color="#e6f0d8"/>
          </linearGradient>
        </defs>
        <rect width="200" height="200" fill="url(#sky2)"/>
        <circle cx="160" cy="40" r="22" fill="#f5d76e"/>
        <ellipse cx="40" cy="50" rx="22" ry="8" fill="#fff" opacity="0.85"/>
        <path d="M0,140 Q60,120 120,135 T200,130 L200,200 L0,200 Z" fill="#9fc77a"/>
        <path d="M0,165 Q60,150 120,160 T200,158 L200,200 L0,200 Z" fill="#7fae5d"/>
        <g transform="translate(50,150)">
          <rect x="-1.5" y="0" width="3" height="30" fill="#7fae5d"/>
          <circle cx="0" cy="-3" r="7" fill="#f4a8c2"/>
          <circle cx="-7" cy="-3" r="7" fill="#f4a8c2"/>
          <circle cx="7" cy="-3" r="7" fill="#f4a8c2"/>
          <circle cx="0" cy="-10" r="7" fill="#f4a8c2"/>
          <circle cx="0" cy="4" r="7" fill="#f4a8c2"/>
          <circle cx="0" cy="-3" r="4" fill="#f5d76e"/>
        </g>
        <g transform="translate(150,155)">
          <rect x="-1.5" y="0" width="3" height="28" fill="#7fae5d"/>
          <circle cx="0" cy="-3" r="7" fill="#c5a8d8"/>
          <circle cx="-7" cy="-3" r="7" fill="#c5a8d8"/>
          <circle cx="7" cy="-3" r="7" fill="#c5a8d8"/>
          <circle cx="0" cy="-10" r="7" fill="#c5a8d8"/>
          <circle cx="0" cy="4" r="7" fill="#c5a8d8"/>
          <circle cx="0" cy="-3" r="4" fill="#f5d76e"/>
        </g>
        <g transform="translate(110,75)">
          <ellipse cx="-8" cy="-3" rx="9" ry="6" fill="#f4a8c2"/>
          <ellipse cx="8" cy="-3" rx="9" ry="6" fill="#f4a8c2"/>
          <ellipse cx="-7" cy="6" rx="6" ry="5" fill="#c5a8d8"/>
          <ellipse cx="7" cy="6" rx="6" ry="5" fill="#c5a8d8"/>
          <ellipse cx="0" cy="0" rx="1.5" ry="6" fill="#4a3328"/>
        </g>
      </svg>
    `;
  }

  function pieceHTML(quad) {
    // quad: 0=TL, 1=TR, 2=BL, 3=BR
    const offsetX = (quad % 2 === 0) ? 0 : -50;
    const offsetY = (quad < 2) ? 0 : -50;
    return `
      <div style="position:absolute;inset:0;overflow:hidden;border-radius:8px;background:#fff;">
        <div style="position:absolute;width:200%;height:200%;left:${offsetX}%;top:${offsetY}%;">
          ${fullSceneSVG().replace('<svg', '<svg style="width:100%;height:100%;"')}
        </div>
      </div>
    `;
  }

  let pieces = [];

  // Pieces are appended INSIDE the puzzle section (position:absolute relative
  // to the section), so they travel with the carousel.
  function build() {
    section.querySelectorAll('.puzzle-piece').forEach(p => p.remove());
    doneEl.classList.remove('show');

    const sectionRect = section.getBoundingClientRect();
    const boardRect = board.getBoundingClientRect();
    const trayRect = tray.getBoundingClientRect();

    const boardLeft = boardRect.left - sectionRect.left;
    const boardTop = boardRect.top - sectionRect.top;
    const boardSize = boardRect.width;
    const fullPieceSize = boardSize / 2;        // size when snapped in slot
    const trayPieceSize = Math.min(fullPieceSize * 0.62, (trayRect.width - 24) / 4 - 4);

    const trayLeft = trayRect.left - sectionRect.left;
    const trayTop = trayRect.top - sectionRect.top;

    // Compute tray slot x-positions: evenly across the tray
    const trayInner = trayRect.width - 16;
    const trayGap = (trayInner - trayPieceSize * 4) / 5;
    pieces = [];
    const order = [0,1,2,3].slice().sort(() => Math.random() - 0.5);
    order.forEach((quad, i) => {
      const el = document.createElement('div');
      el.className = 'puzzle-piece';
      el.style.position = 'absolute';
      el.style.width = trayPieceSize + 'px';
      el.style.height = trayPieceSize + 'px';
      el.dataset.quad = quad;
      el.dataset.fullSize = fullPieceSize;
      // store target snap position
      const slotX = boardLeft + (quad % 2) * fullPieceSize;
      const slotY = boardTop + (quad < 2 ? 0 : 1) * fullPieceSize;
      el.dataset.slotX = slotX;
      el.dataset.slotY = slotY;
      el.innerHTML = pieceHTML(quad);
      const tx = trayLeft + 8 + trayGap + i * (trayPieceSize + trayGap);
      const ty = trayTop + (trayRect.height - trayPieceSize) / 2;
      el.style.left = tx + 'px';
      el.style.top = ty + 'px';
      section.appendChild(el);
      pieces.push(el);
      attachDrag(el);
    });
  }

  function attachDrag(el) {
    let startX, startY, origLeft, origTop, dragging = false, pid = null;
    function onDown(e) {
      if (el.classList.contains('placed')) return;
      e.preventDefault();
      e.stopPropagation();
      dragging = true;
      el.classList.add('dragging');
      pid = e.pointerId ?? 1;
      try { el.setPointerCapture(pid); } catch(_){}
      startX = e.clientX; startY = e.clientY;
      origLeft = parseFloat(el.style.left);
      origTop = parseFloat(el.style.top);
    }
    function onMove(e) {
      if (!dragging) return;
      e.preventDefault();
      el.style.left = (origLeft + (e.clientX - startX)) + 'px';
      el.style.top = (origTop + (e.clientY - startY)) + 'px';
    }
    function onUp(e) {
      if (!dragging) return;
      dragging = false;
      el.classList.remove('dragging');
      try { el.releasePointerCapture(pid); } catch(_){}
      const targetX = parseFloat(el.dataset.slotX);
      const targetY = parseFloat(el.dataset.slotY);
      const fullSize = parseFloat(el.dataset.fullSize);
      const curLeft = parseFloat(el.style.left);
      const curTop = parseFloat(el.style.top);
      const curW = parseFloat(el.style.width);
      const centerDx = (curLeft + curW/2) - (targetX + fullSize/2);
      const centerDy = (curTop + curW/2) - (targetY + fullSize/2);
      const dist = Math.hypot(centerDx, centerDy);
      if (dist < 60) {
        el.style.transition = 'all 220ms ease';
        el.style.width = fullSize + 'px';
        el.style.height = fullSize + 'px';
        el.style.left = targetX + 'px';
        el.style.top = targetY + 'px';
        el.classList.add('placed');
        setTimeout(() => { el.style.transition = ''; }, 240);
        Sound.pop();
        checkDone();
      }
    }
    el.addEventListener('pointerdown', onDown);
    el.addEventListener('pointermove', onMove);
    el.addEventListener('pointerup', onUp);
    el.addEventListener('pointercancel', onUp);
  }

  function checkDone() {
    const allPlaced = pieces.every(p => p.classList.contains('placed'));
    if (allPlaced) {
      doneEl.classList.add('show');
      setTimeout(() => Sound.happy(), 250);
    }
  }

  resetBtn.addEventListener('click', () => {
    pieces.forEach(p => p.remove());
    build();
  });

  function init() {
    pieces.forEach(p => p.remove());
    pieces = [];
    // Wait for the carousel transition to settle so layout rects are accurate.
    setTimeout(() => build(), 480);
  }

  document.addEventListener('game-activated', (e) => {
    if (e.detail.game === 'puzzle') init();
  });

  // If puzzle is the initial visible game, build it once on load.
  window.addEventListener('load', () => {
    if (games[current].dataset.game === 'puzzle') init();
  });

  // Rebuild on resize/orientation change while puzzle is visible.
  let resizeT;
  window.addEventListener('resize', () => {
    clearTimeout(resizeT);
    resizeT = setTimeout(() => {
      if (games[current].dataset.game === 'puzzle') init();
    }, 250);
  });
})();

          <circle cx="68" cy="52" r="2" fill="#fff"/>
        </g>
        <!-- body -->
        <ellipse cx="44" cy="44" rx="3.5" ry="18" fill="#4a3328"/>

        <line x1="44" y1="22" x2="40" y2="14" stroke="#4a3328" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="44" y1="22" x2="48" y2="14" stroke="#4a3328" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="40" cy="14" r="2" fill="#4a3328"/>
        <circle cx="48" cy="14" r="2" fill="#4a3328"/>
      </svg>
    `;
  }

  const el = document.createElement('div');
  el.className = 'butterfly';
  el.innerHTML = butterflySVG();
  wrap.appendChild(el);

  function place(x, y) {
    el.style.left = x + 'px';
    el.style.top = y + 'px';
  }

  function randomSpot() {
    const r = wrap.getBoundingClientRect();
    const pad = 60;
    const x = pad + Math.random() * (r.width - pad*2 - 88);
    const y = 60 + Math.random() * (r.height - pad*2 - 88);
    return {x, y};
  }

  let driftTimer = null;
  let active = false;
  function startDrift() {
    if (driftTimer) clearInterval(driftTimer);
    driftTimer = setInterval(() => {
      if (!active) return;
      const {x,y} = randomSpot();
      place(x, y);
    }, 3500);
  }

  el.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    el.classList.add('fast');
    Sound.happy();
    // burst of stars
    for (let i = 0; i < 4; i++) {
      const b = document.createElement('div');
      b.className = 'happy-burst';
      const r = el.getBoundingClientRect();
      const wr = wrap.getBoundingClientRect();
      b.style.left = (r.left - wr.left + 44 + (Math.random()*40 - 20)) + 'px';
      b.style.top  = (r.top - wr.top + 44 + (Math.random()*20 - 10)) + 'px';
      b.textContent = ['✨','🌸','💛','🌼'][i % 4];
      wrap.appendChild(b);
      setTimeout(() => b.remove(), 1200);
    }
    setTimeout(() => el.classList.remove('fast'), 800);
    const {x,y} = randomSpot();
    place(x, y);
  });

  function start() {
    active = true;
    // initial position
    setTimeout(() => {
      const {x,y} = randomSpot();
      place(x, y);
    }, 50);
    startDrift();
  }
  function stop() {
    active = false;
    if (driftTimer) { clearInterval(driftTimer); driftTimer = null; }
  }

  document.addEventListener('game-activated', (e) => {
    if (e.detail.game === 'butterfly') start();
    else stop();
  });

  // initial placement so it isn't piled at (0,0)
  window.addEventListener('load', () => {
    const r = wrap.getBoundingClientRect();
    place(r.width/2 - 44, r.height/2 - 44);
  });
})();

/* =====================================================
   GAME 6: Coloring Garden
   ===================================================== */
(() => {
  const colorSection = document.querySelector('.game[data-game="color"]');
  const scene = document.getElementById('coloring-scene');
  const wheel = document.getElementById('color-wheel');
  const stickerRow = document.getElementById('sticker-row');
  const stickerLayer = document.getElementById('stickers-layer');
  const tabs = colorSection.querySelectorAll('.tab');
  const clearBtn = document.getElementById('color-clear');

  // 12 garden-friendly colors (pinks, oranges, yellows, greens, blues, purples, brown)
  const colors = [
    '#f4a8c2', '#e88aa9', '#d96666',
    '#fdb462', '#f5d76e', '#e9c44a',
    '#a8d8c5', '#9fc77a', '#7fae5d',
    '#a8c5e8', '#c5a8d8', '#7b5b3d'
  ];
  let currentColor = colors[0];

  const stickerKeys = ['flower', 'butterfly', 'ladybug', 'bee', 'leaf', 'star', 'heart', 'sun'];
  let currentSticker = stickerKeys[0];
  let mode = 'fill';
  const drawLayer = document.getElementById('draw-layer');

  // Build color wheel
  colors.forEach((c, i) => {
    const s = document.createElement('button');
    s.className = 'swatch' + (i === 0 ? ' active' : '');
    s.style.background = c;
    s.dataset.color = c;
    s.setAttribute('aria-label', 'Color ' + c);
    s.addEventListener('click', (e) => {
      e.stopPropagation();
      currentColor = c;
      wheel.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active');
      Sound.tone(600 + i * 25, 0.15, 'sine', 0.08);
    });
    wheel.appendChild(s);
  });

  // Build sticker tray — references symbols defined at top of <body>
  stickerKeys.forEach((k, i) => {
    const btn = document.createElement('button');
    btn.className = 'sticker-pick' + (i === 0 ? ' active' : '');
    btn.dataset.sticker = k;
    btn.setAttribute('aria-label', 'Sticker ' + k);
    btn.innerHTML = `<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><use href="#stk-${k}"/></svg>`;
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      currentSticker = k;
      stickerRow.querySelectorAll('.sticker-pick').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
      Sound.tone(500, 0.15, 'sine', 0.08);
    });
    stickerRow.appendChild(btn);
  });

  // Mode tabs
  tabs.forEach(t => {
    t.addEventListener('click', (e) => {
      e.stopPropagation();
      mode = t.dataset.mode;
      tabs.forEach(x => x.classList.toggle('active', x === t));
      // Color wheel is used by both Fill and Draw modes
      wheel.style.display = (mode === 'fill' || mode === 'draw') ? '' : 'none';
      stickerRow.style.display = (mode === 'sticker') ? '' : 'none';
      Sound.gentle();
    });
  });

  // Convert a pointer event into the SVG's viewBox coordinates
  function svgPoint(evt) {
    const rect = scene.getBoundingClientRect();
    const vb = scene.viewBox.baseVal;
    // Account for preserveAspectRatio="xMidYMid meet" (uniform scale + centering)
    const scale = Math.min(rect.width / vb.width, rect.height / vb.height);
    const drawnW = vb.width * scale;
    const drawnH = vb.height * scale;
    const offX = (rect.width - drawnW) / 2;
    const offY = (rect.height - drawnH) / 2;
    const x = (evt.clientX - rect.left - offX) / scale;
    const y = (evt.clientY - rect.top - offY) / scale;
    return { x, y };
  }

  function placeSticker(key, x, y) {
    const size = 56;
    const useEl = document.createElementNS('http://www.w3.org/2000/svg', 'use');
    useEl.setAttribute('href', '#stk-' + key);
    // Fallback for older renderers
    useEl.setAttributeNS('http://www.w3.org/1999/xlink', 'xlink:href', '#stk-' + key);
    useEl.setAttribute('x', x - size / 2);
    useEl.setAttribute('y', y - size / 2);
    useEl.setAttribute('width', size);
    useEl.setAttribute('height', size);
    useEl.setAttribute('class', 'placed-sticker');
    stickerLayer.appendChild(useEl);
    Sound.tone(720, 0.22, 'sine', 0.12);
  }

  // Scene tap handler — fills regions in fill mode, places/removes stickers in sticker mode.
  // Draw mode is handled separately via pointer events below.
  scene.addEventListener('click', (e) => {
    if (mode === 'draw') return;
    const target = e.target;
    // Tapping a previously-placed sticker removes it (any non-draw mode)
    if (target.tagName && target.tagName.toLowerCase() === 'use') {
      e.stopPropagation();
      target.remove();
      Sound.tone(420, 0.16, 'sine', 0.07);
      return;
    }
    if (mode === 'fill') {
      if (target.classList && target.classList.contains('fillable')) {
        target.setAttribute('fill', currentColor);
        Sound.pop();
      }
    } else if (mode === 'sticker') {
      const pt = svgPoint(e);
      placeSticker(currentSticker, pt.x, pt.y);
    }
  });

  // ===== Drawing (Draw mode) =====
  let currentPath = null;
  let lastPt = null;

  scene.addEventListener('pointerdown', (e) => {
    if (mode !== 'draw') return;
    e.preventDefault();
    const pt = svgPoint(e);
    lastPt = pt;
    currentPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    currentPath.setAttribute('d', `M${pt.x.toFixed(1)},${pt.y.toFixed(1)}`);
    currentPath.setAttribute('stroke', currentColor);
    currentPath.setAttribute('stroke-width', '5');
    currentPath.setAttribute('stroke-linecap', 'round');
    currentPath.setAttribute('stroke-linejoin', 'round');
    currentPath.setAttribute('fill', 'none');
    currentPath.setAttribute('class', 'drawn-stroke');
    drawLayer.appendChild(currentPath);
    try { scene.setPointerCapture(e.pointerId); } catch (_) {}
  });

  scene.addEventListener('pointermove', (e) => {
    if (mode !== 'draw' || !currentPath) return;
    e.preventDefault();
    const pt = svgPoint(e);
    // Throttle: skip if movement is tiny (avoids huge d strings)
    if (lastPt) {
      const dx = pt.x - lastPt.x, dy = pt.y - lastPt.y;
      if (dx*dx + dy*dy < 1.5) return;
    }
    lastPt = pt;
    const d = currentPath.getAttribute('d') + ` L${pt.x.toFixed(1)},${pt.y.toFixed(1)}`;
    currentPath.setAttribute('d', d);
  });

  function endStroke(e) {
    if (!currentPath) return;
    // If user just tapped (no movement), draw a tiny dot so something shows up
    const d = currentPath.getAttribute('d');
    if (!d.includes(' L')) {
      currentPath.setAttribute('d', d + ' l0.1,0');
    }
    Sound.tone(560, 0.10, 'sine', 0.05);
    currentPath = null;
    lastPt = null;
    if (e && e.pointerId != null) {
      try { scene.releasePointerCapture(e.pointerId); } catch (_) {}
    }
  }
  scene.addEventListener('pointerup', endStroke);
  scene.addEventListener('pointercancel', endStroke);
  scene.addEventListener('pointerleave', endStroke);

  clearBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    scene.querySelectorAll('.fillable').forEach(el => {
      el.setAttribute('fill', el.dataset.default || '#fff8ec');
    });
    stickerLayer.innerHTML = '';
    drawLayer.innerHTML = '';
    Sound.gentle();
  });

  // =====================================================
  //  Scene generator — composes a fresh garden from a small
  //  library of "artifacts" (sun, clouds, hills, flowers,
  //  trees, mushrooms, butterflies, bees, ladybugs, etc).
  //  Every artifact is fillable so the kid can color it in.
  // =====================================================
  const sceneLayer = document.getElementById('scene-layer');
  const DEFAULT_FILL = '#fff8ec';
  const OUTLINE = '#4a3328';
  const VB_W = 400, VB_H = 380;

  // Minimum sizes so shapes stay big enough for little fingers to tap.
  const MIN_STEM_W = 6;   // flower stems (thin verticals were easy to miss)
  const MIN_STAR   = 7;   // night-sky stars
  const MIN_DECO_R = 3.2; // decorative dots kept visible but non-tappable

  function shape(tag, attrs) {
    const merged = Object.assign({
      class: 'fillable',
      'data-default': DEFAULT_FILL,
      fill: DEFAULT_FILL,
      stroke: OUTLINE,
      'stroke-width': 2,
      'stroke-linejoin': 'round',
      'stroke-linecap': 'round'
    }, attrs);
    const a = Object.entries(merged)
      .filter(([_, v]) => v !== undefined && v !== null)
      .map(([k, v]) => `${k}="${v}"`).join(' ');
    return `<${tag} ${a}/>`;
  }
  // Decorative detail that is intentionally NOT colorable — the tiny dots/eyes
  // that were too small to tap. pointer-events:none lets a tap fall through to
  // the bigger shape behind, so kids color the cap/body instead of missing.
  function deco(tag, attrs) {
    const merged = Object.assign({
      fill: OUTLINE,
      stroke: 'none',
      'pointer-events': 'none'
    }, attrs);
    const a = Object.entries(merged)
      .filter(([_, v]) => v !== undefined && v !== null)
      .map(([k, v]) => `${k}="${v}"`).join(' ');
    return `<${tag} ${a}/>`;
  }
  const rnd = (min, max) => min + Math.random() * (max - min);
  const rndI = (min, max) => Math.floor(rnd(min, max + 1));
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];

  // --- Sky artifacts ---
  function sun(cx, cy, r, withRays) {
    let s = shape('circle', { cx, cy, r });
    if (withRays) {
      for (let i = 0; i < 8; i++) {
        const ang = i * (Math.PI / 4);
        const r1 = r + 4, r2 = r + 14;
        const ax = cx + Math.cos(ang) * r1, ay = cy + Math.sin(ang) * r1;
        const bx = cx + Math.cos(ang) * r2, by = cy + Math.sin(ang) * r2;
        const perp = ang + Math.PI / 2;
        const w = 3;
        const p1x = ax + Math.cos(perp) * w, p1y = ay + Math.sin(perp) * w;
        const p2x = ax - Math.cos(perp) * w, p2y = ay - Math.sin(perp) * w;
        const d = `M${p1x.toFixed(1)},${p1y.toFixed(1)} L${bx.toFixed(1)},${by.toFixed(1)} L${p2x.toFixed(1)},${p2y.toFixed(1)} Z`;
        s += shape('path', { d });
      }
    }
    return s;
  }
  function moon(cx, cy, r, crescent) {
    if (crescent) {
      const off = r * 0.45;
      const d = `M${cx + off*0.3},${cy - r} A${r},${r} 0 1,0 ${cx + off*0.3},${cy + r} A${r*0.85},${r*0.85} 0 1,1 ${cx + off*0.3},${cy - r} Z`;
      return shape('path', { d });
    }
    return shape('circle', { cx, cy, r });
  }
  function cloud(cx, cy, scale) {
    return shape('circle', { cx: cx - 16*scale, cy, r: 12*scale })
         + shape('circle', { cx: cx + 16*scale, cy, r: 12*scale })
         + shape('circle', { cx, cy: cy - 8*scale, r: 16*scale });
  }
  function starShape(cx, cy, size) {
    size = Math.max(MIN_STAR, size);
    const pts = [];
    for (let i = 0; i < 10; i++) {
      const a = (i * 36 - 90) * Math.PI / 180;
      const rr = (i % 2 === 0) ? size : size * 0.45;
      pts.push(`${(cx + Math.cos(a)*rr).toFixed(1)},${(cy + Math.sin(a)*rr).toFixed(1)}`);
    }
    return shape('polygon', { points: pts.join(' ') });
  }

  // --- Terrain ---
  function hillPath(yL, yMid, yR) {
    return shape('path', { d: `M0,${yL} Q200,${yMid} 400,${yR} L400,380 L0,380 Z` });
  }

  // --- Plants ---
  function flower(cx, baseY, scale, petals) {
    const stemLen = rnd(28, 50) * scale;
    const headY = baseY - stemLen;
    const stemW = Math.max(MIN_STEM_W, 4.5 * scale);
    let s = shape('rect', { x: cx - stemW/2, y: headY, width: stemW, height: stemLen });
    if (Math.random() < 0.65) {
      const ly = headY + stemLen * rnd(0.35, 0.7);
      const side = Math.random() < 0.5 ? -1 : 1;
      const lw = rnd(11, 16) * scale, lh = rnd(5, 8) * scale;
      const d = `M${cx},${ly} Q${cx + side*lw*0.5},${ly - lh*0.9} ${cx + side*lw},${ly + lh*0.2} Q${cx + side*lw*0.5},${ly + lh*0.7} ${cx},${ly} Z`;
      s += shape('path', { d });
    }
    const pRX = rnd(4.5, 6) * scale, pRY = rnd(9, 12) * scale;
    const offsetY = pRY * 0.95;
    for (let i = 0; i < petals; i++) {
      const ang = i * (360 / petals);
      s += `<g transform="rotate(${ang.toFixed(2)} ${cx} ${headY})">` +
           shape('ellipse', { cx, cy: headY - offsetY, rx: pRX, ry: pRY }) +
           '</g>';
    }
    s += shape('circle', { cx, cy: headY, r: Math.max(4.5, 5.5 * scale) });
    return s;
  }
  function mushroom(cx, baseY, scale) {
    const capW = rnd(14, 22) * scale;
    const capH = rnd(10, 14) * scale;
    let s = shape('path', {
      d: `M${cx - capW},${baseY} Q${cx - capW},${baseY - capH} ${cx},${baseY - capH} Q${cx + capW},${baseY - capH} ${cx + capW},${baseY} Z`
    });
    const stemW = capW * 0.55, stemH = rnd(10, 16) * scale;
    s += shape('rect', { x: cx - stemW/2, y: baseY, width: stemW, height: stemH });
    const n = rndI(2, 3);
    for (let i = 0; i < n; i++) {
      s += deco('circle', {
        cx: cx + rnd(-capW*0.55, capW*0.55),
        cy: baseY - capH * rnd(0.35, 0.7),
        r: Math.max(MIN_DECO_R, 2.2 * scale),
        fill: DEFAULT_FILL
      });
    }
    return s;
  }
  function tree(cx, baseY, scale) {
    const trunkW = 8 * scale, trunkH = rnd(28, 36) * scale;
    let s = shape('rect', { x: cx - trunkW/2, y: baseY - trunkH, width: trunkW, height: trunkH });
    const r = rnd(20, 26) * scale;
    s += shape('circle', { cx, cy: baseY - trunkH - r * 0.55, r });
    s += shape('circle', { cx: cx - r * 0.75, cy: baseY - trunkH - r * 0.3, r: r * 0.7 });
    s += shape('circle', { cx: cx + r * 0.75, cy: baseY - trunkH - r * 0.3, r: r * 0.7 });
    return s;
  }
  function bush(cx, baseY, scale) {
    const r = rnd(10, 14) * scale;
    return shape('circle', { cx, cy: baseY - r * 0.55, r })
         + shape('circle', { cx: cx - r * 0.85, cy: baseY - r * 0.35, r: r * 0.7 })
         + shape('circle', { cx: cx + r * 0.85, cy: baseY - r * 0.35, r: r * 0.7 });
  }

  // --- Critters ---
  function butterflyArt(cx, cy, scale) {
    return shape('ellipse', { cx: cx - 9*scale, cy: cy - 5*scale, rx: 9*scale, ry: 7*scale })
         + shape('ellipse', { cx: cx + 9*scale, cy: cy - 5*scale, rx: 9*scale, ry: 7*scale })
         + shape('ellipse', { cx: cx - 7*scale, cy: cy + 7*scale, rx: 7*scale, ry: 6*scale })
         + shape('ellipse', { cx: cx + 7*scale, cy: cy + 7*scale, rx: 7*scale, ry: 6*scale })
         + shape('ellipse', { cx, cy, rx: 1.6*scale, ry: 11*scale });
  }
  function beeArt(cx, cy, scale) {
    return shape('ellipse', { cx, cy, rx: 9*scale, ry: 6*scale })
         + shape('ellipse', { cx: cx - 4*scale, cy: cy - 6*scale, rx: 5*scale, ry: 4*scale })
         + shape('ellipse', { cx: cx + 4*scale, cy: cy - 6*scale, rx: 5*scale, ry: 4*scale });
  }
  function ladybugArt(cx, cy, scale) {
    const w = 10 * scale, h = 8 * scale;
    let s = shape('path', { d: `M${cx - w},${cy} Q${cx - w},${cy - h} ${cx},${cy - h} Q${cx + w},${cy - h} ${cx + w},${cy} Z` });
    s += deco('circle', { cx: cx - 4*scale, cy: cy - 4*scale, r: Math.max(MIN_DECO_R, 1.8*scale) });
    s += deco('circle', { cx: cx + 4*scale, cy: cy - 4*scale, r: Math.max(MIN_DECO_R, 1.8*scale) });
    s += deco('circle', { cx, cy: cy - 6*scale, r: Math.max(MIN_DECO_R, 1.8*scale) });
    return s;
  }
  function snail(cx, baseY, scale) {
    const r = 9 * scale;
    let s = shape('circle', { cx: cx - 4*scale, cy: baseY - r, r });
    s += shape('circle', { cx: cx - 4*scale, cy: baseY - r, r: r * 0.5 });
    s += shape('path', {
      d: `M${cx - 14*scale},${baseY} Q${cx - 14*scale},${baseY - 4*scale} ${cx + 4*scale},${baseY - 4*scale} L${cx + 10*scale},${baseY} Z`
    });
    s += deco('circle', { cx: cx + 8*scale, cy: baseY - 9*scale, r: Math.max(2.4, 1.6*scale) });
    return s;
  }

  // --- Scene composer ---
  function generateScene() {
    let svg = '';
    // sky background
    svg += shape('rect', { x: 0, y: 0, width: VB_W, height: 280 });

    const isDay = Math.random() < 0.65;
    if (isDay) {
      svg += sun(rnd(40, 360), rnd(28, 80), rnd(20, 32), Math.random() < 0.7);
      const n = rndI(1, 3);
      for (let i = 0; i < n; i++) svg += cloud(rnd(50, 350), rnd(40, 130), rnd(0.8, 1.4));
    } else {
      svg += moon(rnd(60, 340), rnd(30, 80), rnd(16, 24), Math.random() < 0.6);
      const ns = rndI(3, 7);
      for (let i = 0; i < ns; i++) svg += starShape(rnd(20, 380), rnd(20, 140), rnd(MIN_STAR, MIN_STAR + 4));
      if (Math.random() < 0.4) svg += cloud(rnd(60, 340), rnd(50, 130), rnd(0.7, 1.1));
    }

    // hills
    svg += hillPath(rnd(240, 270), rnd(220, 250), rnd(240, 270));
    if (Math.random() < 0.75) svg += hillPath(rnd(290, 308), rnd(268, 292), rnd(290, 308));

    // plants (with anti-overlap)
    const groundY = 312;
    const minSpacing = 38;
    const positions = [];
    let attempts = 0;
    const target = rndI(4, 7);
    while (positions.length < target && attempts < 80) {
      attempts++;
      const x = rnd(28, VB_W - 28);
      if (positions.every(p => Math.abs(p - x) > minSpacing)) positions.push(x);
    }
    positions.forEach(x => {
      const r = Math.random();
      const by = groundY + rnd(-4, 6);
      if (r < 0.55)      svg += flower(x, by, rnd(0.85, 1.45), pick([5, 5, 6, 6, 7, 8]));
      else if (r < 0.75) svg += mushroom(x, by, rnd(0.75, 1.2));
      else if (r < 0.90) svg += tree(x, by, rnd(0.85, 1.3));
      else               svg += bush(x, by, rnd(0.9, 1.4));
    });

    // critters
    const nc = rndI(1, 3);
    for (let i = 0; i < nc; i++) {
      const cx = rnd(45, VB_W - 45);
      const cy = rnd(130, 235);
      const sc = rnd(0.85, 1.25);
      const r = Math.random();
      if (r < 0.5)      svg += butterflyArt(cx, cy, sc);
      else if (r < 0.8) svg += beeArt(cx, cy, sc);
      else              svg += ladybugArt(cx, cy, sc);
    }
    if (Math.random() < 0.25) svg += snail(rnd(50, 350), groundY + 2, rnd(0.8, 1.15));

    return svg;
  }

  function newScene() {
    sceneLayer.innerHTML = generateScene();
    stickerLayer.innerHTML = '';
    drawLayer.innerHTML = '';
  }

  const newSceneBtn = document.getElementById('color-newscene');
  newSceneBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    newScene();
    Sound.chime([523, 659, 784], 70, 0.25);
  });

  // Render an initial scene so there's something to color the first time.
  newScene();
})();


/* Prevent iOS double-tap zoom */
let lastTouch = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouch <= 320) e.preventDefault();
  lastTouch = now;
}, { passive: false });

/* Prevent pull-to-refresh / extra gestures */
document.addEventListener('gesturestart', (e) => e.preventDefault());

</script>
